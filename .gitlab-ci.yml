stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.25.5"
  BINARY_NAME: "syncerman"

test:
  image: golang:${GO_VERSION}
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - go test -v -cover ./...
  only:
    - branches
    - merge_requests

build:linux:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - VERSION=$(cat VERSION 2>/dev/null || echo "dev")
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - GO_VERSION_CI=$(go version | awk '{print $3}')
    - GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X gitlab.com/kinnalru/syncerman/internal/version.Version=${VERSION} -X gitlab.com/kinnalru/syncerman/internal/version.GitCommit=${CI_COMMIT_SHORT_SHA} -X gitlab.com/kinnalru/syncerman/internal/version.BuildTime=${BUILD_TIME} -X gitlab.com/kinnalru/syncerman/internal/version.GoVersion=${GO_VERSION_CI}" -o bin/syncerman-linux-amd64
    - echo "Built version: ${VERSION}"
  artifacts:
    paths:
      - bin/syncerman-linux-amd64
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags

build:windows:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - VERSION=$(cat VERSION 2>/dev/null || echo "dev")
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - GO_VERSION_CI=$(go version | awk '{print $3}')
    - GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X gitlab.com/kinnalru/syncerman/internal/version.Version=${VERSION} -X gitlab.com/kinnalru/syncerman/internal/version.GitCommit=${CI_COMMIT_SHORT_SHA} -X gitlab.com/kinnalru/syncerman/internal/version.BuildTime=${BUILD_TIME} -X gitlab.com/kinnalru/syncerman/internal/version.GoVersion=${GO_VERSION_CI}" -o bin/syncerman-windows-amd64.exe
    - echo "Built version: ${VERSION}"
  artifacts:
    paths:
      - bin/syncerman-windows-amd64.exe
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags

create_release:
  image: registry.gitlab.com/gitlab-org/cli:latest
  stage: release
  needs:
    - build:linux
    - build:windows
  only:
    - /^v\d+\.\d+\.\d+$/
  script:
    - VERSION=$(cat VERSION 2>/dev/null || echo "dev")
    - echo "Releasing version: ${VERSION}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Syncerman $CI_COMMIT_TAG'
    description: 'Syncerman CLI for bidirectional file synchronization using rclone'
    assets:
      links:
        - name: 'syncerman-linux-amd64'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-linux-amd64?job=build:linux'
        - name: 'syncerman-windows-amd64.exe'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-windows-amd64.exe?job=build:windows'
