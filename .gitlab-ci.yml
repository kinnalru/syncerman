stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.25.5"
  BINARY_NAME: "syncerman"

test:
  image: golang:${GO_VERSION}
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - go test -v -cover ./...
  only:
    - branches
    - merge_requests

build:linux:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - make linux
  artifacts:
    paths:
      - bin/syncerman-linux-amd64
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags

build:windows:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - make windows
  artifacts:
    paths:
      - bin/syncerman-windows-amd64
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags

release:
  image: registry.gitlab.com/gitlab-org/cli:latest
  stage: release
  needs:
    - build:linux
    - build:windows
  only:
    - /^v\d+\.\d+\.\d+$/
  script:
    - export VERSION=$(cat VERSION 2>/dev/null || echo dev)
    - echo Releasing version ${VERSION}
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Syncerman $CI_COMMIT_TAG'
    description: 'Syncerman CLI for bidirectional file synchronization using rclone'
    assets:
      links:
        - name: 'syncerman-linux-amd64'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-linux-amd64?job=build:linux'
        - name: 'syncerman-windows-amd64.exe'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-windows-amd64.exe?job=build:windows'
