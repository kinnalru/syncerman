stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.21"
  BINARY_NAME: "syncerman"

test:
  image: golang:${GO_VERSION}
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - go test -v -cover ./...
  only:
    - branches
    - merge_requests

build:linux:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o bin/syncerman-linux-amd64
  artifacts:
    paths:
      - bin/syncerman-linux-amd64
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags

build:windows:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o bin/syncerman-windows-amd64.exe
  artifacts:
    paths:
      - bin/syncerman-windows-amd64.exe
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags

release:
  image: curlimages/curl:latest
  stage: release
  needs:
    - build:linux
    - build:windows
  only:
    - /^v\d+\.\d+\.\d+$/
  script:
    - |
      curl --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
           --request POST \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
           --form "name=Release ${CI_COMMIT_TAG}" \
           --form "tag_name=${CI_COMMIT_TAG}" \
           --form "description=Syncerman ${CI_COMMIT_TAG}" \
           --form "assets[links][0][name]=syncerman-linux-amd64" \
           --form "assets[links][0][url]=${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-linux-amd64?job=build:linux" \
           --form "assets[links][1][name]=syncerman-windows-amd64.exe" \
           --form "assets[links][1][url]=${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-windows-amd64.exe?job=build:windows"
