stages:
  - test
  - build
  - release
  - schedule

variables:
  GO_VERSION: "1.25.5"
  BINARY_NAME: "syncerman"

# workflow:
#   rules:
#     - if: $CI_PIPELINE_SOURCE == "schedule"
#       when: never
#     - when: always


test:
  image: golang:${GO_VERSION}
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  script:
    - go mod download
    - go test -v -cover ./...
  only:
    - branches
    - merge_requests
  except:
    - schedule

build:linux:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  variables:
    BINARY_OUTPUT: "syncerman-linux-amd64"
  script:
    - go mod download
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - GO_VERSION_CI=$(go version | awk '{print $3}')
    - make linux GitCommit="${CI_COMMIT_SHORT_SHA}" BuildTime="${BUILD_TIME}" GoVersion="${GO_VERSION_CI}"
    - echo "Built version $(cat VERSION 2>/dev/null || echo 'dev')"
  artifacts:
    paths:
      - bin/${BINARY_OUTPUT}
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags
  except:
    - schedule


build:windows:
  image: golang:${GO_VERSION}
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  variables:
    BINARY_OUTPUT: "syncerman-windows-amd64"
  script:
    - go mod download
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - GO_VERSION_CI=$(go version | awk '{print $3}')
    - make windows GitCommit="${CI_COMMIT_SHORT_SHA}" BuildTime="${BUILD_TIME}" GoVersion="${GO_VERSION_CI}"
    - echo "Built version $(cat VERSION 2>/dev/null || echo 'dev')"
  artifacts:
    paths:
      - bin/${BINARY_OUTPUT}
    expire_in: 1 week
  only:
    - branches
    - merge_requests
    - tags
  except:
    - schedule

release:
  image: registry.gitlab.com/gitlab-org/cli:latest
  stage: release
  needs:
    - build:linux
    - build:windows
  only:
    - /^v\d+\.\d+\.\d+$/
  script:
    - export VERSION=$(cat VERSION 2>/dev/null || echo dev)
    - echo Releasing version ${VERSION}
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Syncerman $CI_COMMIT_TAG'
    description: 'Syncerman CLI for bidirectional file synchronization using rclone'
    assets:
      links:
        - name: 'syncerman-linux-amd64'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-linux-amd64?job=build:linux'
        - name: 'syncerman-windows-amd64.exe'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/syncerman-windows-amd64.exe?job=build:windows'
